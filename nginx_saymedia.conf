server {
    listen 80;
    # Match cả apex và subdomain (vd: game.saymediaai.com)
    server_name saymediaai.com game.saymediaai.com *.saymediaai.com;

    # Cho phép upload lớn (nếu bạn upload qua API endpoint đằng sau proxy).
    client_max_body_size 50m;

    # Serve ảnh tĩnh trực tiếp (không qua Nuxt/Node).
    location /uploads/ {
        alias "C:/Users/Liketech/Desktop/saymedia/public/uploads/";
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    # Phần còn lại (HTML/API/WS) proxy vào Nuxt.
    location / {
        proxy_pass http://127.0.0.1:4012;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
